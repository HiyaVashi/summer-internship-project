

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Login</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

<div id="loginPage">

<header class="topbar">

    <div class="logo">

        <i class="fa-solid fa-building"></i>

        EMS Portal

    </div>

</header>

<div class="dashboard">

<aside class="sidebar">

<h3>

Employee Portal

</h3>

<div class="sidebar-info">

<p>

Welcome to the Employee Management System.

</p>

<p>

Login securely to access employee services.

</p>

</div>

<div class="feature-box">

<i class="fa-solid fa-shield-halved"></i>

<span>

JWT Authentication

</span>

</div>

<div class="feature-box">

<i class="fa-solid fa-calendar-check"></i>

<span>

Attendance Tracking

</span>

</div>

<div class="feature-box">

<i class="fa-solid fa-file-circle-check"></i>

<span>

Leave Management

</span>

</div>

<div class="feature-box">

<i class="fa-solid fa-robot"></i>

<span>

AI Reports

</span>

</div>

</aside>

<main class="content">

<div class="login-card">

<div class="login-header">

<h1>

Welcome Back 👋

</h1>

<p>

Login to continue to EMS Portal

</p>

</div>

<form id="loginForm">

<div class="form-group">

<label>

Email Address

</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Enter your email">

</div>

<div
id="emailError"
class="error">

</div>

</div>

<div class="form-group">

<label>

Password

</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Enter your password">

</div>

<div
id="passwordError"
class="error">

</div>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

<div
id="successMsg"
class="success">

</div>

<div
id="loginError"
class="error center">

</div>

</form>
<div class="login-actions">

    <a href="index.html" class="back-btn">

        <i class="fa-solid fa-arrow-left"></i>

        Back to Dashboard

    </a>

</div>

</div>

</main>

</div>

<footer>

    © 2026 Employee Management System

</footer>

</div>

<script src="js/login.js"></script>

</body>

</html>
