
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leave Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="css/leave.css">
</head>
<body>
<div id="pageContent">
<header class="topbar">
<div class="logo"><i class="fa-solid fa-building"></i> EMS Portal</div>
<a href="index.html" id="closeBtn">← Dashboard</a>
</header>

<div class="dashboard">
<aside class="sidebar">
<h3>Navigation</h3>
<a href="index.html">Dashboard</a>
<a href="employeeRegForm.html">Employee Registration</a>
<a href="attendanceForm.html">Attendance</a>
<a class="active">Leave Management</a>
</aside>

<main class="content">
<div class="card">
<h1>Leave Management</h1>
<p class="subtitle">Submit and manage leave requests.</p>

<div id="employeeLeaveSection">
<form id="leaveForm">

<section class="section">
<h2>Employee Details</h2>
<div class="form-grid">
<div class="form-group"><label>Employee ID</label><input id="employeeId" readonly></div>
<div class="form-group"><label>Employee Name</label><input id="employeeName" readonly></div>
<div class="form-group"><label>Department</label><input id="department" readonly></div>
</div>
</section>

<section class="section">
<h2>Leave Application</h2>
<div class="form-grid">
<div class="form-group"><label>Leave Type</label><select id="leaveType"><option value="">Select</option><option>Sick Leave</option><option>Casual Leave</option><option>Paid Leave</option><option>Emergency Leave</option></select><div class="error" id="leaveTypeError"></div></div>
<div class="form-group"><label>Start Date</label><input type="date" id="startDate"><div class="error" id="startError"></div></div>
<div class="form-group"><label>End Date</label><input type="date" id="endDate"><div class="error" id="endError"></div></div>
<div class="form-group"><label>Contact Number</label><input id="contact"><div class="error" id="contactError"></div></div>
<div class="form-group"><label>Alternate Email</label><input type="email" id="email"><div class="error" id="emailError"></div></div>
<div class="form-group"><label>Reporting Manager</label><input id="manager"><div class="error" id="managerError"></div></div>
<div class="form-group full-width"><label>Reason for Leave</label><textarea id="reason"></textarea><div class="error" id="reasonError"></div></div>
</div>
<button type="submit" class="submit-btn">Submit Leave Request</button>
<div id="successMsg" class="success"></div>
</section>

<section class="section" id="myLeaveStatusSection">
<h2>My Leave Requests</h2>
<div id="myLeaveContainer" class="display-box"></div>
</section>
</form>
</div>

<section class="section" id="hrLeaveSection" style="display:none;">
<h2>Manage Leave Requests</h2>
<div id="leaveActionMsg" class="success"></div>
<div id="leaveRequestsContainer" class="display-box"></div>
</section>

</div>
</main>
</div>
<script src="js/leave.js"></script>
</div>
</body>
</html>
