

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="css/attendance.css">
</head>
<body>

<div id="pageContent">

<header class="topbar">
<div class="logo"><i class="fa-solid fa-building"></i> EMS Portal</div>
<a href="index.html" id="closeBtn">← Dashboard</a>
</header>

<div class="dashboard">

<aside class="sidebar">
<h3>Navigation</h3>
<a href="index.html">Dashboard</a>
<a href="employeeRegForm.html">Employee Registration</a>
<a class="active">Attendance</a>
<a href="leaveApplicationForm.html">Leave Management</a>
</aside>

<main class="content">

<div class="card">
<h1>Attendance Management</h1>
<p class="subtitle">Manage attendance, tasks and AI reports.</p>

<form id="attendanceForm">

<section class="section">
<h2>Attendance Details</h2>
<div class="form-grid">

<div class="form-group"><label>Employee ID</label><input id="employeeId" readonly></div>
<div class="form-group"><label>Employee Name</label><input id="employeeName" readonly></div>
<div class="form-group"><label>Department</label><input id="department" readonly></div>

<button type="button" id="checkInBtn" class="submit-btn">Check In</button>
<button type="button" id="checkOutBtn" class="submit-btn">Check Out</button>

<div class="form-group">
<label>Status</label>
<select id="status"><option value="">Select</option><option>Present</option><option>Absent</option><option>Half Day</option><option>Leave</option><option>Work From Home</option></select>
<div class="error" id="statusError"></div>
</div>

<div class="form-group">
<label>Work Mode</label>
<select id="workMode"><option value="">Select</option><option>Office</option><option>Remote</option><option>Hybrid</option></select>
<div class="error" id="workModeError"></div>
</div>

<div class="form-group">
<label>Reporting Manager</label>
<input id="manager">
<div class="error" id="managerError"></div>
</div>

<div id="attendanceInfo" class="full-width info-box"></div>

<div class="form-group full-width">
<label>Remarks</label>
<textarea id="remarks"></textarea>
<div class="error" id="remarksError"></div>
</div>

</div>

<div id="successMsg" class="success"></div>
</section>

<section class="section" id="adminTaskSection">
<h2>Assign Task</h2>
<div class="form-grid">
<div class="form-group"><label>Employee</label><select id="employeeDropdown"><option>Select Employee</option></select></div>
<div class="form-group"><label>Task Title</label><input id="taskTitle"></div>
<div class="form-group"><label>Deadline</label><input type="date" id="taskDeadline"></div>
<div class="form-group full-width"><label>Description</label><textarea id="taskDescription"></textarea></div>
</div>
<button type="button" id="assignTaskBtn" class="submit-btn">Assign Task</button>
<div id="taskSuccessMsg" class="success"></div>
</section>

<section class="section" id="aiReportSection">
<h2>AI Employee Performance Report</h2>
<div class="form-group">
<label>Select Employee</label>
<select id="reportEmployeeDropdown"><option>Select Employee</option></select>
</div>
<button type="button" id="generateReportBtn" class="submit-btn">Generate AI Report</button>
<div id="reportLoading" class="success"></div>
<div id="reportContainer">No report generated yet.</div>
</section>

<section class="section" id="employeeTaskSection">
<h2>My Tasks</h2>
<div id="taskContainer"></div>
</section>

</form>
</div>

</main>
</div>
</div>

<script src="js/attendance.js"></script>
</body>
</html>
